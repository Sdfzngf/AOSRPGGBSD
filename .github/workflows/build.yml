name: Build and Package

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    name: Build (Linux, Clang, Release)
    runs-on: ubuntu-24.04

    env:
      BUILD_TYPE: Release
      BUILD_DIR: ${{ github.workspace }}/build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            clang \
            ccache \
            libasound2-dev \
            libpulse-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxss-dev \
            libxtst-dev \
            libxfixes-dev \
            libdrm-dev \
            libgbm-dev \
            libwayland-dev \
            wayland-protocols \
            libudev-dev \
            libdbus-1-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libjpeg-dev \
            libpng-dev \
            libtiff-dev \
            libwebp-dev \
            libogg-dev \
            libvorbis-dev \
            libflac-dev \
            libmpg123-dev \
            libopusfile-dev \
            libfuse2 \
            fluid-soundfont-gm

      - name: Download LMMS AppImage
        run: |
          mkdir -p "${{ github.workspace }}/lmms-appimage"
          cd "${{ github.workspace }}/lmms-appimage"
          wget -O lmms.AppImage "https://github.com/LMMS/lmms/releases/download/v1.3.0-alpha.1/lmms-1.3.0-alpha.1.102+g89fc6c9-linux-x86_64.AppImage"
          chmod +x lmms.AppImage
          ln -sf lmms.AppImage lmms
          echo "${{ github.workspace }}/lmms-appimage" >> $GITHUB_PATH

      - name: Verify LMMS installation
        run: |
          export PATH="${{ github.workspace }}/lmms-appimage:$PATH"
          lmms --version || true

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ github.ref }}-
            ccache-${{ runner.os }}-

      - name: Restore CPM dependencies cache
        uses: actions/cache@v4
        with:
          path: ${{ env.BUILD_DIR }}/_deps
          key: cpm-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'cpm-package-lock.cmake') }}
          restore-keys: |
            cpm-${{ runner.os }}-

      - name: Configure CMake
        run: |
          cmake -B "$BUILD_DIR" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build "$BUILD_DIR" --config "$BUILD_TYPE" --parallel $(nproc)

      - name: Build BGM (export music via LMMS)
        timeout-minutes: 10
        run: |
          export PATH="${{ github.workspace }}/lmms-appimage:$PATH"
          mkdir -p "$BUILD_DIR/soundfonts"
          ln -sf /usr/share/sounds/sf2/FluidR3_GM.sf2 "$BUILD_DIR/soundfonts/"
          cmake --build "$BUILD_DIR" --config "$BUILD_TYPE" --target BGM

      - name: Pack resources
        run: cmake --build "$BUILD_DIR" --config "$BUILD_TYPE" --target PackRes

      - name: Package artifacts
        run: |
          mkdir -p dist
          tar -czf dist/AOSRPGGBSD-${{ github.ref_name }}-linux-x86_64.tar.gz \
            -C "$BUILD_DIR/bin" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AOSRPGGBSD-${{ github.ref_name }}-linux-x86_64
          path: dist/AOSRPGGBSD-${{ github.ref_name }}-linux-x86_64.tar.gz
          if-no-files-found: error

      - name: Create GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AOSRPGGBSD-${{ github.ref_name }}-linux-x86_64.tar.gz
          generate_release_notes: true
